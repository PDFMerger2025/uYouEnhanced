name: Build uYouEnhanced DEB

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "16.5"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload DEB as artifact"
        default: true
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build rootless DEB
    runs-on: macos-14
    permissions:
      contents: write
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout uYouEnhanced
        uses: actions/checkout@v5
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          fetch-depth: 1
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make gawk

      - name: Set GNU make PATH
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Clone Theos
        run: git clone --recursive --depth=1 https://github.com/theos/theos.git "$THEOS"

      - name: Download requested SDK
        run: |
          mkdir -p "$THEOS/sdks"
          SDK_FILE="iPhoneOS${{ inputs.sdk_version }}.sdk.tar.xz"
          SDK_URL="https://github.com/theos/sdks/releases/download/master-1.0/${SDK_FILE}"

          echo "Downloading ${SDK_URL}"
          curl -fL "$SDK_URL" -o "$SDK_FILE"

          file "$SDK_FILE"
          tar -xJf "$SDK_FILE" -C "$THEOS/sdks"
          ls -la "$THEOS/sdks"

      - name: Verify requested SDK exists
        run: |
          test -d "$THEOS/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk"

      - name: Update Makefile target
        run: |
          cd "${{ github.workspace }}/main"
          sed -i '' "1s#.*#export TARGET = iphone:clang:${{ inputs.sdk_version }}:14.0#g" Makefile
          head -n 5 Makefile

      - name: Build package
        id: build_package
        run: |
          cd "${{ github.workspace }}/main"
          export THEOS="$THEOS"
          make clean
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1

          pkg="$(ls -t packages/*.deb | head -n1)"
          test -n "$pkg"

          echo "package=$(basename "$pkg")" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$pkg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

          echo "Built package: $(basename "$pkg")"
          echo "SHA256: $(shasum -a 256 "$pkg" | awk '{print $1}')"

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: uYouEnhanced_DEB_${{ github.run_number }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deb-${{ github.run_number }}
          name: uYouEnhanced DEB ${{ github.run_number }}
          draft: true
          files: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
