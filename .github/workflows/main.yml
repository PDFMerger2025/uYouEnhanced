name: Build uYouEnhanced DEB

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "16.5"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload DEB as artifact"
        default: true
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build rootless DEB
    runs-on: macos-14
    permissions:
      contents: write
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout uYouEnhanced
        uses: actions/checkout@v5
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          fetch-depth: 1
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make gawk unzip

      - name: Set GNU make PATH
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Clone Theos
        run: git clone --recursive --depth=1 https://github.com/theos/theos.git "$THEOS"

      - name: Download SDK repo zip
        run: |
          curl -fL https://github.com/theos/sdks/archive/refs/heads/master.zip -o sdks.zip
          unzip -q sdks.zip

      - name: Install requested SDK
        run: |
          mkdir -p "$THEOS/sdks"
          SDK_SRC="$(find . -type d -name "iPhoneOS${{ inputs.sdk_version }}.sdk" | head -n 1)"
          test -n "$SDK_SRC"
          echo "Found SDK at: $SDK_SRC"
          cp -R "$SDK_SRC" "$THEOS/sdks/"
          test -d "$THEOS/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk"
          ls -la "$THEOS/sdks"

      - name: Patch Makefile SDK settings
        run: |
          cd "${{ github.workspace }}/main"

          perl -0pi -e 's|export TARGET = .*|export TARGET = iphone:clang:${{ inputs.sdk_version }}:14.0|g' Makefile
          perl -0pi -e 's|export SDK_PATH = .*|export SDK_PATH = \$(THEOS)/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk/|g' Makefile
          perl -0pi -e 's|export SYSROOT = .*|export SYSROOT = \$(SDK_PATH)|g' Makefile

          echo "Patched Makefile lines:"
          grep -nE 'TARGET|SDK_PATH|SYSROOT' Makefile || true

      - name: Ensure filter plist exists
        run: |
          cd "${{ github.workspace }}/main"

          if [ -f "uYouEnhanced.plist" ]; then
            echo "uYouEnhanced.plist already exists"
          elif [ -f "Filter.plist" ]; then
            echo "Filter.plist already exists"
          elif [ -f "uYouPlus.plist" ]; then
            cp "uYouPlus.plist" "uYouEnhanced.plist"
            echo "Copied uYouPlus.plist -> uYouEnhanced.plist"
          else
            echo "No filter plist found"
            find . -maxdepth 2 -name "*.plist"
            exit 1
          fi

          ls -la *.plist || true

      - name: Build package
        id: build_package
        run: |
          cd "${{ github.workspace }}/main"
          export THEOS="$THEOS"
          make clean
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1

          pkg="$(ls -t packages/*.deb | head -n1)"
          test -n "$pkg"

          echo "package=$(basename "$pkg")" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$pkg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

          echo "Built package: $(basename "$pkg")"
          echo "SHA256: $(shasum -a 256 "$pkg" | awk '{print $1}')"

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: uYouEnhanced_DEB_${{ github.run_number }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deb-${{ github.run_number }}
          name: uYouEnhanced DEB ${{ github.run_number }}
          draft: true
          files: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
