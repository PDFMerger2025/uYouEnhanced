name: Build uYouEnhanced DEB

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "16.5"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload DEB as artifact"
        default: true
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build rootless DEB
    runs-on: macos-14
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Main
        uses: actions/checkout@v5
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          submodules: recursive

      - name: Install Dependencies
        run: brew install ldid dpkg make gawk

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Setup Theos
        uses: actions/checkout@v5
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: theos/sdks/
          key: ios-sdk-${{ inputs.sdk_version }}

      - name: Download iOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/aricloverALT/sdks.git sdks
          cd sdks
          git sparse-checkout init --no-cone
          git sparse-checkout set iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mv iPhoneOS${{ inputs.sdk_version }}.sdk "$THEOS/sdks/"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Verify SDK
        run: |
          test -d "${{ github.workspace }}/theos/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk"
          echo "Using SDK:"
          ls -1 "${{ github.workspace }}/theos/sdks" | grep "iPhoneOS"

      - name: Build Package
        id: build_package
        run: |
          cd "${{ github.workspace }}/main"

          sed -i '' "1s#.*#export TARGET = iphone:clang:${{ inputs.sdk_version }}:14.0#g" Makefile

          export THEOS="${{ github.workspace }}/theos"
          export THEOS_PACKAGE_SCHEME=rootless

          make clean
          make package FINALPACKAGE=1

          pkg="$(ls -t packages/*.deb | head -n1)"
          test -n "$pkg"

          echo "package=$(basename "$pkg")" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$pkg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

          echo "Built package: $(basename "$pkg")"
          echo "SHA256: $(shasum -a 256 "$pkg" | awk '{print $1}')"

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: uYouEnhanced_DEB_${{ github.run_number }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deb-${{ github.run_number }}
          name: uYouEnhanced DEB ${{ github.run_number }}
          draft: true
          files: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
